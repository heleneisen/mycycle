[build]
  command = "npx expo export --platform web"
  publish = "dist"

[dev]
  # Proxy the already-running Expo dev server on :8081; netlify dev adds functions on :8888
  # Run `npx expo start --web` first, then `netlify dev` in a second terminal
  targetPort = 8081
  port = 8888
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
